<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes" />
    <title>نظام حجوزات المختبر - مدرسة الحوراء</title>
    <meta http-equiv="refresh" content="300" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* ... نفس الـ CSS السابق مع تعديلات بسيطة ... */
        
        /* تعديل animation للجدول */
        .table-responsive {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            position: relative;
        }
        
        /* إزالة display: block من tbody */
        .schedule-table {
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 0 6px;
            position: relative;
        }
        
        /* استخدام wrapper للتحريك بدلاً من tbody */
        .table-scroll-wrapper {
            position: relative;
            overflow: hidden;
        }
        
        .auto-scroll {
            animation: slowScrollUp 60s linear infinite;
        }
        
        @keyframes slowScrollUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); } /* تعديل لتحريك نصف المحتوى فقط */
        }
        
        .table-responsive:hover .auto-scroll {
            animation-play-state: paused;
        }
    </style>
</head>

<body>
    <!-- ... نفس الـ HTML ... -->

    <script>
        // تحديث دالة parseCSV للتعامل مع الفواصل بشكل أفضل
        function parseCSV(text) {
            var lines = text.split(/\r?\n/);
            var results = [];
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (!line) continue;
                
                var result = [];
                var current = '';
                var inQuotes = false;
                
                for (var j = 0; j < line.length; j++) {
                    var char = line[j];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        result.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                result.push(current.trim());
                results.push(result);
            }
            return results;
        }

        // تحديث دالة renderSchedule
        function renderSchedule(bookings) {
            var now = new Date();
            var isSecondShift = now.getHours() >= 12;
            var data = getCurrentAndNextPeriod();
            var bookedCount = 0;
            var totalBookable = 0;
            
            var html = '<table class="schedule-table">';
            html += '<thead><tr>';
            html += '<th>#</th><th>الحصة</th><th>التوقيت</th><th>المدة</th><th>الصف</th><th>المادة</th><th>المعلمة</th><th>عنوان الدرس</th>';
            html += '</tr></thead>';
            
            // إنشاء صفوف الجدول مرة واحدة فقط بدون تكرار
            html += '<tbody id="scheduleBody">';
            
            for (var i = 0; i < timeTable.length; i++) {
                var period = timeTable[i];
                var timeSlot = period.times[isSecondShift ? 1 : 0];
                var booking = bookings[period.period];
                
                if (period.period !== 'الطابور' && period.period !== 'الفسحة') {
                    totalBookable++;
                    if (booking) bookedCount++;
                }

                var rowClass = '';
                if (data.currentPeriod && data.currentPeriod.index === i) {
                    rowClass = 'current-period';
                } else if (data.nextPeriod && data.nextPeriod.index === i) {
                    rowClass = 'next-period';
                } else if (period.period === 'الطابور' || period.period === 'الفسحة') {
                    rowClass = 'break-row';
                } else if (booking) {
                    rowClass = 'booked';
                }

                html += '<tr class="' + rowClass + '">';
                html += '<td>' + (i + 1) + '</td>';
                html += '<td><strong>' + period.period + '</strong></td>';
                html += '<td><span class="time-badge">' + timeSlot.start + ' - ' + timeSlot.end + '</span></td>';
                html += '<td>' + period.duration + ' د</td>';

                if (booking) {
                    html += '<td>' + escapeHTML(booking.grade) + '</td>';
                    html += '<td>' + escapeHTML(booking.subject) + '</td>';
                    html += '<td>' + escapeHTML(booking.teacher) + '</td>';
                    html += '<td><span class="experiment-badge">' + escapeHTML(booking.lesson) + '</span></td>';
                } else if (period.period === 'الطابور' || period.period === 'الفسحة') {
                    html += '<td colspan="4" class="empty-cell">استراحة</td>';
                } else {
                    html += '<td colspan="4" class="empty-cell">متاح للحجز</td>';
                }
                html += '</tr>';
            }
            
            html += '</tbody></table>';
            
            document.getElementById('tableContent').innerHTML = html;
            document.getElementById('bookedCount').textContent = bookedCount;
            document.getElementById('emptyCount').textContent = totalBookable - bookedCount;
            document.getElementById('totalPeriods').textContent = totalBookable;
            
            updatePercentage(bookedCount, totalBookable);
        }

        // تحديث دالة getCurrentAndNextPeriod
        function getCurrentAndNextPeriod() {
            var currentTimeInMinutes = getCurrentTimeInMinutes();
            var isSecondShift = currentTimeInMinutes >= 12 * 60;
            var currentPeriod = null;
            var nextPeriod = null;

            for (var i = 0; i < timeTable.length; i++) {
                var period = timeTable[i];
                var timeSlot = period.times[isSecondShift ? 1 : 0];
                var start = timeToMinutes(timeSlot.start);
                var end = timeToMinutes(timeSlot.end);
                
                if (currentTimeInMinutes >= start && currentTimeInMinutes < end) {
                    currentPeriod = { 
                        index: i, 
                        period: period.period, 
                        start: timeSlot.start, 
                        end: timeSlot.end 
                    };
                    
                    // البحث عن الحصة التالية
                    if (timeTable[i + 1]) {
                        var nextP = timeTable[i + 1];
                        var nextSlot = nextP.times[isSecondShift ? 1 : 0];
                        nextPeriod = { 
                            index: i + 1,
                            period: nextP.period, 
                            start: nextSlot.start 
                        };
                    }
                    break;
                }
            }
            
            return { currentPeriod: currentPeriod, nextPeriod: nextPeriod };
        }

        // تحديث دالة fetchSchedule
        function fetchSchedule() {
            var xhr = new XMLHttpRequest();
            var finalUrl = csvUrl + '&t=' + new Date().getTime();
            
            xhr.onload = function() {
                if (xhr.status === 200) {
                    try {
                        var data = xhr.responseText;
                        var rows = parseCSV(data);
                        var now = new Date();
                        
                        // تصحيح تنسيق التاريخ ليطابق Google Sheets
                        var today = now.getFullYear() + '/' + 
                                   String(now.getMonth() + 1).padStart(2, '0') + '/' + 
                                   String(now.getDate()).padStart(2, '0');
                        
                        console.log('Searching for date:', today); // للتتبع
                        
                        var bookings = {};
                        var notes = [];
                        
                        for (var i = 1; i < rows.length; i++) {
                            var row = rows[i];
                            if (row.length >= 9 && row[2]) {
                                // تنظيف التاريخ من المسافات
                                var rowDate = row[2].trim();
                                if (rowDate === today) {
                                    var periodName = row[3] ? row[3].trim() : '';
                                    if (periodName) {
                                        bookings[periodName] = { 
                                            teacher: row[4] || '', 
                                            subject: row[5] || '', 
                                            grade: row[6] || '', 
                                            lesson: row[7] || '' 
                                        };
                                        if (row[8]) notes.push(row[8].trim());
                                    }
                                }
                            }
                        }
                        
                        currentBookings = bookings;
                        renderSchedule(bookings);
                        updateSafetyMarquee(notes);
                        updateMarquee();
                        
                    } catch (error) {
                        console.error('Error parsing data:', error);
                        document.getElementById('tableContent').innerHTML = 
                            '<div class="error">خطأ في تحميل البيانات: ' + error.message + '</div>';
                    }
                } else {
                    document.getElementById('tableContent').innerHTML = 
                        '<div class="error">خطأ في تحميل البيانات. الرجاء المحاولة لاحقاً.</div>';
                }
            };
            
            xhr.onerror = function() {
                document.getElementById('tableContent').innerHTML = 
                    '<div class="error">تعذر الاتصال بالخادم. تحقق من اتصالك بالإنترنت.</div>';
            };
            
            xhr.open('GET', finalUrl, true);
            xhr.send();
        }

        // إضافة دالة للتحديث اليدوي (للتجربة)
        function manualRefresh() {
            fetchSchedule();
        }

        document.addEventListener('DOMContentLoaded', function() {
            updateCurrentTime();
            fetchSchedule();
            
            // تحديث الوقت كل ثانية
            setInterval(updateCurrentTime, 1000);
            
            // تحديث البيانات كل 5 دقائق
            setInterval(fetchSchedule, REFRESH_INTERVAL);
            
            // إضافة مستمع للتحديث اليدوي (يمكن إضافته كزر)
            document.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === 'r') {
                    e.preventDefault();
                    manualRefresh();
                }
            });
        });
    </script>
</body>
</html>
