<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>نظام حجوزات المختبر - مدرسة الحوراء</title>
    <!-- رابط التحديث أصبح عبر Service Worker، تم إزالة meta refresh -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- تم إضافة defer لتأخير تحميل الخط غير الحرج -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" defer>
    <!-- بيان تطبيق الويب التقدمي (PWA) -->
    <link rel="manifest" href="manifest.json">
    <style>
        /* تم إعادة تنظيم الأنماط وإضافة تحسينات الأداء والوصولية */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #3498db;
            --secondary-color: #2980b9;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --current-period-color: #ffd700;
            --current-period-bg: rgba(255, 215, 0, 0.2);
            --next-period-color: #87CEEB;
            --next-period-bg: rgba(135, 206, 235, 0.15);
            --text-light: #ffffff;
            --text-dark: #2c3e50;
            --contrast-bg: #000000;
        }

        /* تحسين التباين للأجهزة عالية السطوع */
        @media (prefers-contrast: high) {
            :root {
                --primary-color: #1e3a8a;
                --secondary-color: #1e3a8a;
                --current-period-color: #ffaa00;
                --next-period-color: #005c99;
                --text-dark: #000000;
            }
            .header, .table-container, .stat-card {
                background: white !important;
                border: 3px solid black !important;
            }
        }

        html, body {
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 15px;
            position: relative;
        }

        @media (min-width: 1024px) {
            html, body {
                height: 100vh;
                overflow: hidden;
                align-items: center;
            }
        }

        .tv-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at 50% 50%, #1a237e, #000000);
            opacity: 0.15;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 1920px;
        }

        .header {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 15px 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.5);
            flex-shrink: 0;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .qr-code {
            flex-shrink: 0;
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 2px solid var(--primary-color);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .qr-code:hover {
            transform: scale(1.05);
        }

        .qr-code img {
            display: block;
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        /* تحسين الوصف للقارئات الآلية */
        .qr-code img[alt] {
            font-size: 0; /* إخفاء النص الاحتياطي */
        }

        @media (min-width: 768px) {
            .qr-code img {
                width: 100px;
                height: 100px;
            }
        }

        .time-info-container {
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 20px;
            padding: 12px 20px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 180px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            width: 100%;
            justify-content: center;
        }

        .info-item i {
            font-size: 1.2rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            min-width: 25px;
            text-align: center;
        }

        .update-badge {
            background: rgba(255, 215, 0, 0.25);
            padding: 5px 15px;
            border-radius: 30px;
            border: 1px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            width: 100%;
            justify-content: center;
            margin-top: 5px;
        }

        .update-badge i {
            animation: spin 3s linear infinite;
        }

        /* تقليل الحركة بناءً على تفضيل المستخدم */
        @media (prefers-reduced-motion: reduce) {
            .update-badge i, .marquee-container, .safety-marquee-container {
                animation: none !important;
            }
            .qr-code:hover {
                transform: none;
            }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .school-name-container {
            flex: 1;
            text-align: center;
        }

        .school-name {
            margin-bottom: 5px;
        }

        .school-name h1 {
            color: #2c3e50;
            font-size: clamp(2rem, 5vw, 4rem); /* تم التكبير للشاشات الكبيرة */
            font-weight: 800;
            margin-bottom: 5px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .school-name h1 i {
            color: #e74c3c;
            animation: pulse 2s infinite;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
        }

        .school-name .subtitle {
            color: #7f8c8d;
            font-size: clamp(1rem, 1.8vw, 1.5rem);
            font-weight: 400;
            border-bottom: 2px solid var(--primary-color);
            display: inline-block;
            padding-bottom: 4px;
        }

        /* شريط الحصص المتحرك - مع إمكانية الإيقاف */
        .periods-marquee {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            border-radius: 40px;
            padding: 8px 15px;
            color: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
            font-size: 1rem;
        }

        .marquee-container {
            display: flex;
            align-items: center;
            gap: 30px;
            animation: scrollLeftToRight 70s linear infinite;
            white-space: nowrap;
            direction: ltr;
            width: fit-content;
        }

        /* إيقاف التمرير عند التحويم أو التركيز - تحكم يدوي */
        .marquee-container:hover,
        .marquee-container:focus-within {
            animation-play-state: paused;
        }

        @keyframes scrollLeftToRight {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .marquee-item {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 5px 18px;
            border-radius: 35px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 1rem;
        }

        .marquee-item.current {
            background: linear-gradient(135deg, #ffd700, #f39c12);
            color: #2c3e50;
            font-weight: 700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .marquee-item.next {
            background: linear-gradient(135deg, #87CEEB, #00BFFF);
            color: #2c3e50;
            font-weight: 600;
        }

        .marquee-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .marquee-text {
            font-size: 1rem;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            flex-shrink: 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        .stat-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            flex-shrink: 0;
        }

        .stat-details {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }

        .stat-details h3 {
            color: #7f8c8d;
            font-size: clamp(0.9rem, 1.5vw, 1.1rem);
            font-weight: 500;
            margin: 0;
        }

        .stat-details .stat-number {
            color: #2c3e50;
            font-size: clamp(1.3rem, 2.5vw, 1.8rem);
            font-weight: 800;
            line-height: 1;
        }

        .table-container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.8);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .table-responsive {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
        }

        .table-responsive::-webkit-scrollbar {
            display: none;
        }

        .schedule-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 6px;
            table-layout: fixed;
        }

        .schedule-table th {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 12px 8px;
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: clamp(0.8rem, 1.3vw, 1rem);
        }

        .schedule-table th:first-child { border-radius: 12px 0 0 12px; width: 45px; }
        .schedule-table th:nth-child(2) { width: 90px; }
        .schedule-table th:nth-child(3) { width: 110px; }
        .schedule-table th:nth-child(4) { width: 80px; }
        .schedule-table th:nth-child(5) { width: 120px; }
        .schedule-table th:nth-child(6) { width: 100px; }
        .schedule-table th:nth-child(7) { width: 130px; }
        .schedule-table th:last-child { border-radius: 0 12px 12px 0; width: auto; }

        .schedule-table td {
            background: white;
            padding: 10px 6px;
            text-align: center;
            font-size: clamp(0.8rem, 1.3vw, 1rem);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .schedule-table td:first-child { 
            border-radius: 12px 0 0 12px; 
            font-weight: bold;
            background: linear-gradient(to left, white, #f0f7ff);
        }
        .schedule-table td:last-child { border-radius: 0 12px 12px 0; }

        .current-period {
            background: var(--current-period-bg) !important;
            border-right: 4px solid var(--current-period-color) !important;
        }

        .current-period td {
            background: var(--current-period-bg) !important;
            font-weight: 700;
        }

        .next-period {
            background: var(--next-period-bg) !important;
            border-right: 4px solid var(--next-period-color) !important;
        }

        .next-period td {
            background: var(--next-period-bg) !important;
        }

        .time-badge {
            display: inline-block;
            background: rgba(52, 152, 219, 0.1);
            padding: 3px 6px;
            border-radius: 15px;
            font-size: 0.75rem;
            color: var(--primary-color);
            white-space: nowrap;
        }

        .booked { 
            background: linear-gradient(135deg, #27ae60, #2ecc71) !important; 
        }
        .booked td { 
            background: transparent !important; 
            color: white !important; 
        }
        .booked .time-badge {
            background: rgba(255, 255, 255, 0.25);
            color: white;
        }

        .experiment-badge {
            display: inline-block;
            background: rgba(52, 152, 219, 0.1);
            padding: 4px 10px;
            border-radius: 25px;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            font-size: 0.8rem;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .booked .experiment-badge {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-color: white;
        }

        .empty-cell { 
            color: #95a5a6; 
            font-style: italic; 
            background: #f8f9fa !important;
        }

        .safety-marquee {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border-radius: 40px;
            padding: 10px 15px;
            color: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
            margin: 5px 0;
        }

        .safety-marquee-container {
            display: flex;
            align-items: center;
            gap: 20px;
            animation: scrollSafety 30s linear infinite;
            white-space: nowrap;
            direction: ltr;
            width: fit-content;
        }

        .safety-marquee-container:hover {
            animation-play-state: paused;
        }

        @keyframes scrollSafety {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .safety-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
        }

        .safety-text {
            font-size: 1.3rem;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }

        @media (max-width: 1024px) {
            .header-content {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .time-info-container {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .info-item {
                width: auto;
            }
            
            .update-badge {
                width: auto;
            }
            
            .safety-text {
                font-size: 1rem;
            }
            
            .safety-icon {
                width: 30px;
                height: 30px;
                font-size: 1rem;
            }
        }

        .footer {
            text-align: center;
            color: white;
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            backdrop-filter: blur(5px);
            flex-shrink: 0;
        }

        .footer p {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            font-size: clamp(0.7rem, 1.1vw, 0.9rem);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .break-row {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d) !important;
        }
        
        .break-row td {
            background: transparent !important;
            color: white !important;
            font-weight: 700;
        }

        /* زر إيقاف التمرير (للتحكم اليدوي) */
        .pause-scroll-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        
        .pause-scroll-btn:hover {
            background: rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div class="tv-background"></div>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <!-- كود QR على اليمين مع وصف ARIA -->
                <div class="qr-code" onclick="window.open('https://ahmed4050.github.io/LAB_BOOKING2/', '_blank')" role="button" tabindex="0" aria-label="افتح صفحة الحجوزات" title="افتح صفحة الحجوزات">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://ahmed4050.github.io/LAB_BOOKING2/" 
                         alt="رمز QR لصفحة حجوزات المختبر - امسح للوصول السريع"
                         title="مسح للوصول إلى صفحة الحجوزات">
                </div>
                
                <div class="school-name-container">
                    <div class="school-name">
                        <h1>
                            <i class="fas fa-flask" aria-hidden="true"></i>
                            مدرسة الحوراء
                            <i class="fas fa-microscope" aria-hidden="true"></i>
                        </h1>
                        <div class="subtitle">نظام حجوزات المختبر المدرسي</div>
                    </div>
                </div>
                
                <div class="time-info-container" role="region" aria-label="معلومات الوقت والتاريخ">
                    <div class="info-item">
                        <i class="fas fa-calendar-day" aria-hidden="true"></i>
                        <span id="currentDate"></span>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-clock" aria-hidden="true"></i>
                        <span id="currentTime">--:-- --</span>
                    </div>
                    <div class="update-badge">
                        <i class="fas fa-sync-alt" aria-hidden="true"></i>
                        <span>تحديث كل 5 دقائق</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="periods-marquee" id="periodsMarquee">
            <div class="marquee-container" id="marqueeContainer">
                <!-- سيتم ملؤها بالجافاسكريبت -->
            </div>
        </div>

        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-list-ol" aria-hidden="true"></i></div>
                <div class="stat-details"><h3>إجمالي الحصص</h3><div class="stat-number" id="totalPeriods">8</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-check-circle" aria-hidden="true"></i></div>
                <div class="stat-details"><h3>المحجوزة</h3><div class="stat-number" id="bookedCount">0</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-door-open" aria-hidden="true"></i></div>
                <div class="stat-details"><h3>الشاغرة</h3><div class="stat-number" id="emptyCount">8</div></div>
            </div>
        </div>

        <div class="table-container">
            <!-- زر إيقاف التمرير المؤقت -->
            <button class="pause-scroll-btn" id="pauseScrollBtn" aria-label="إيقاف التمرير التلقائي مؤقتاً">
                <i class="fas fa-pause" id="pauseIcon"></i>
            </button>
            <div id="tableWrapper" class="table-responsive" role="region" aria-label="جدول الحصص">
                <div id="tableContent"></div>
            </div>
        </div>

        <div class="safety-marquee">
            <div class="safety-marquee-container">
                <span class="safety-icon" aria-hidden="true"><i class="fas fa-shield-alt"></i></span>
                <span class="safety-text" role="marquee">⚠️ سلامتك تبدأ من سلوكك الواعي داخل المختبر ⚠️</span>
                <span class="safety-icon" aria-hidden="true"><i class="fas fa-flask"></i></span>
                <span class="safety-icon" aria-hidden="true"><i class="fas fa-shield-alt"></i></span>
                <span class="safety-text" aria-hidden="true">⚠️ سلامتك تبدأ من سلوكك الواعي داخل المختبر ⚠️</span>
                <span class="safety-icon" aria-hidden="true"><i class="fas fa-flask"></i></span>
            </div>
        </div>

        <div class="footer">
            <p>
                <span><i class="fas fa-chalkboard-teacher" aria-hidden="true"></i> إشراف فنية المختبر أ.نادية السيابي</span>
                <span><i class="fas fa-copyright" aria-hidden="true"></i> جميع الحقوق محفوظة لمدرسة الحوراء 2026</span>
            </p>
        </div>
    </div>

    <script defer>
        // استخدام Strict Mode لتحسين الأداء
        'use strict';

        // تكوين ثابت
        const CONFIG = {
            DATA_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRASDUlO20FT6MI1NVQKSAKF4EBY1cVP0usamiNw37msjkFklLvqyUHtomJMOQu9_YfOERTok-X9ti/pub?output=csv',
            REFRESH_INTERVAL: 300000, // 5 دقائق
            SCROLL_SPEED: 0.8,
            FALLBACK_DATA: [] // بيانات احتياطية (يمكن ملؤها)
        };

        const timeTable = [
            { period: "الطابور", duration: 10, times: [{ start: "7:00", end: "7:10" }, { start: "7:10", end: "7:20" }] },
            { period: "الأولى", duration: 40, times: [{ start: "7:10", end: "7:50" }, { start: "7:20", end: "8:00" }] },
            { period: "الثانية", duration: 40, times: [{ start: "7:55", end: "8:35" }, { start: "8:05", end: "8:45" }] },
            { period: "الثالثة", duration: 40, times: [{ start: "8:40", end: "9:20" }, { start: "8:50", end: "9:30" }] },
            { period: "الرابعة", duration: 40, times: [{ start: "9:25", end: "10:05" }, { start: "9:35", end: "10:15" }] },
            { period: "الفسحة", duration: 20, times: [{ start: "10:05", end: "10:25" }, { start: "10:15", end: "10:35" }] },
            { period: "الخامسة", duration: 40, times: [{ start: "10:25", end: "11:05" }, { start: "10:35", end: "11:15" }] },
            { period: "السادسة", duration: 40, times: [{ start: "11:10", end: "11:50" }, { start: "11:20", end: "12:00" }] },
            { period: "السابعة", duration: 40, times: [{ start: "11:55", end: "12:35" }, { start: "12:05", end: "12:45" }] },
            { period: "الثامنة", duration: 40, times: [{ start: "12:40", end: "1:20" }, { start: "12:50", end: "1:30" }] }
        ];

        let currentBookings = {};
        let scrollPaused = false;
        let observer = null;
        let animationFrame = null;
        let lastScrollPosition = 0;

        // دوال مساعدة
        const timeToMinutes = (timeStr) => {
            if (!timeStr) return 0;
            let [hours, minutes] = timeStr.split(':').map(Number);
            if (isNaN(hours) || isNaN(minutes)) return 0;
            if (hours < 7 && hours > 0) hours += 12;
            return hours * 60 + minutes;
        };

        const getCurrentTimeInMinutes = () => {
            const now = new Date();
            return now.getHours() * 60 + now.getMinutes();
        };

        const getCurrentAndNextPeriod = () => {
            const currentTime = getCurrentTimeInMinutes();
            const isSecondShift = currentTime >= 12 * 60;
            let current = null, next = null;

            for (let i = 0; i < timeTable.length; i++) {
                const p = timeTable[i];
                const t = p.times[isSecondShift ? 1 : 0];
                const start = timeToMinutes(t.start);
                const end = timeToMinutes(t.end);

                if (currentTime >= start && currentTime < end) {
                    current = { index: i, period: p.period, start: t.start, end: t.end, shift: isSecondShift ? 2 : 1 };
                    break;
                }
            }

            if (current) {
                for (let i = current.index + 1; i < timeTable.length; i++) {
                    const p = timeTable[i];
                    const t = p.times[isSecondShift ? 1 : 0];
                    if (timeToMinutes(t.start) > currentTime) {
                        next = { index: i, period: p.period, start: t.start, end: t.end, shift: isSecondShift ? 2 : 1 };
                        break;
                    }
                }
            }
            return { currentPeriod: current, nextPeriod: next };
        };

        const updateCurrentTime = () => {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('currentDate').innerHTML = now.toLocaleDateString('ar-SA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        };

        // تحديث الشريط العلوي
        const updateMarquee = () => {
            const marquee = document.getElementById('marqueeContainer');
            if (!marquee) return;
            
            const { currentPeriod, nextPeriod } = getCurrentAndNextPeriod();
            const currentLesson = currentPeriod ? (currentBookings[currentPeriod.period]?.lesson || 'لا يوجد حجز') : '';
            const nextLesson = nextPeriod ? (currentBookings[nextPeriod.period]?.lesson || 'لا يوجد حجز') : '';

            if (!currentPeriod) {
                marquee.innerHTML = `
                    <div class="marquee-item">
                        <span class="marquee-icon"><i class="fas fa-clock"></i></span>
                        <span class="marquee-text">لا توجد حصة حالياً</span>
                    </div>
                    <div class="marquee-item">
                        <span class="marquee-icon"><i class="fas fa-hourglass-half"></i></span>
                        <span class="marquee-text">⏳ الحصة التالية: ${nextPeriod?.period || 'غير معروفة'}</span>
                    </div>
                    <span style="color: #ffd700; font-size: 1.5rem;">✦</span>
                `.repeat(3);
                return;
            }

            marquee.innerHTML = Array(3).fill(0).map(() => `
                <div class="marquee-item current">
                    <span class="marquee-icon"><i class="fas fa-play-circle"></i></span>
                    <span class="marquee-text">🔴 الحصة الحالية: ${currentPeriod.period} | عنوان الدرس: ${currentLesson}</span>
                </div>
                <div class="marquee-item next">
                    <span class="marquee-icon"><i class="fas fa-hourglass-half"></i></span>
                    <span class="marquee-text">⏳ الحصة التالية: ${nextPeriod?.period || 'لا توجد'} | عنوان الدرس: ${nextLesson}</span>
                </div>
                <span style="color: #ffd700; font-size: 1.5rem;">✦</span>
            `).join('');
        };

        // تمرير تلقائي باستخدام Intersection Observer + requestAnimationFrame
        const setupAutoScroll = () => {
            const wrapper = document.getElementById('tableWrapper');
            if (!wrapper || scrollPaused) return;

            if (observer) observer.disconnect();

            // استخدام Intersection Observer لمراقبة الصف الحالي
            const currentRow = wrapper.querySelector('.current-period');
            if (currentRow) {
                observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (!entry.isIntersecting && !scrollPaused) {
                            // التمرير بسلاسة باستخدام requestAnimationFrame
                            const targetTop = currentRow.offsetTop - wrapper.clientHeight / 2 + currentRow.clientHeight / 2;
                            const smoothScroll = () => {
                                const currentScroll = wrapper.scrollTop;
                                const diff = targetTop - currentScroll;
                                if (Math.abs(diff) > 1) {
                                    wrapper.scrollTop += diff * 0.05; // تسريع/تبطيء تدريجي
                                    animationFrame = requestAnimationFrame(smoothScroll);
                                } else {
                                    wrapper.scrollTop = targetTop;
                                    cancelAnimationFrame(animationFrame);
                                }
                            };
                            cancelAnimationFrame(animationFrame);
                            animationFrame = requestAnimationFrame(smoothScroll);
                        }
                    });
                }, { threshold: 0.5, root: wrapper });
                
                observer.observe(currentRow);
            }
        };

        // تحميل البيانات (مع fallback)
        const fetchSchedule = async () => {
            try {
                const response = await fetch(CONFIG.DATA_URL);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split(',').map(cell => cell.trim()));
                
                const now = new Date();
                const today = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}`;
                
                let booked = 0;
                currentBookings = {};
                const isSecondShift = now.getHours() >= 12;

                // بناء HTML باستخدام DOM methods لتجنب concatenation
                const tbody = document.createElement('tbody');
                
                timeTable.forEach((period, idx) => {
                    const tr = document.createElement('tr');
                    const timeSlot = period.times[isSecondShift ? 1 : 0];
                    
                    // البحث عن حجز
                    let booking = null;
                    for (let i = 1; i < rows.length; i++) {
                        if (rows[i].length >= 5 && rows[i][2] === today && rows[i][3] === period.period) {
                            booking = {
                                teacher: rows[i][4] || "غير محدد",
                                subject: rows[i][5] || "غير محدد",
                                grade: rows[i][6] || "غير محدد",
                                lesson: rows[i][7] || "غير محدد"
                            };
                            if (!['الطابور', 'الفسحة'].includes(period.period)) booked++;
                            currentBookings[period.period] = booking;
                            break;
                        }
                    }

                    // تحديد class للصف
                    const { currentPeriod, nextPeriod } = getCurrentAndNextPeriod();
                    if (currentPeriod?.index === idx) tr.classList.add('current-period');
                    else if (nextPeriod?.index === idx) tr.classList.add('next-period');
                    else if (['الطابور', 'الفسحة'].includes(period.period)) tr.classList.add('break-row');
                    else if (booking) tr.classList.add('booked');

                    // بناء الخلايا
                    tr.innerHTML = `
                        <td>${idx + 1}</td>
                        <td><strong>${period.period}</strong></td>
                        <td><span class="time-badge"><i class="fas fa-clock"></i> ${timeSlot.start} - ${timeSlot.end}</span></td>
                        <td>${period.duration} د</td>
                        ${booking ? 
                            `<td>${booking.grade}</td>
                             <td>${booking.subject}</td>
                             <td><i class="fas fa-user-tie"></i> ${booking.teacher}</td>
                             <td><span class="experiment-badge"><i class="fas fa-flask"></i> ${booking.lesson}</span></td>` :
                            (['الطابور', 'الفسحة'].includes(period.period) ?
                             '<td colspan="4" class="empty-cell"><i class="fas fa-coffee"></i> استراحة</td>' :
                             '<td colspan="4" class="empty-cell"><i class="fas fa-check-circle"></i> متاح للحجز</td>')
                        }
                    `;
                    tbody.appendChild(tr);
                });

                const table = document.createElement('table');
                table.className = 'schedule-table';
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th>#</th><th>الحصة</th><th>التوقيت</th><th>المدة</th>
                            <th>الصف</th><th>المادة</th><th>المعلمة</th><th>عنوان الدرس</th>
                        </tr>
                    </thead>
                `;
                table.appendChild(tbody);

                const container = document.getElementById('tableContent');
                container.innerHTML = '';
                container.appendChild(table);

                // تحديث الإحصائيات
                const total = timeTable.filter(p => !['الطابور', 'الفسحة'].includes(p.period)).length;
                document.getElementById('bookedCount').textContent = booked;
                document.getElementById('emptyCount').textContent = total - booked;
                document.getElementById('totalPeriods').textContent = total;

                updateMarquee();
                setupAutoScroll();

            } catch (error) {
                console.error('خطأ في تحميل البيانات:', error);
                document.getElementById('tableContent').innerHTML = '<p style="text-align:center; padding:20px; color:#e74c3c;"><i class="fas fa-exclamation-triangle"></i> خطأ في تحميل البيانات. استخدام البيانات المحفوظة مؤقتاً.</p>';
                // استخدام البيانات الاحتياطية هنا إذا كانت موجودة
            }
        };

        // إعداد Service Worker لتشغيل وضع Kiosk
        const registerServiceWorker = () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('Service Worker registered');
                }).catch(err => console.error('SW registration failed:', err));
            }
        };

        // إدارة وضع ملء الشاشة
        const requestFullScreen = () => {
            const docElm = document.documentElement;
            if (docElm.requestFullscreen) docElm.requestFullscreen();
            else if (docElm.mozRequestFullScreen) docElm.mozRequestFullScreen();
            else if (docElm.webkitRequestFullScreen) docElm.webkitRequestFullScreen();
            else if (docElm.msRequestFullscreen) docElm.msRequestFullscreen();
        };

        // أحداث بدء التشغيل
        document.addEventListener('DOMContentLoaded', () => {
            updateCurrentTime();
            fetchSchedule();
            registerServiceWorker();
            
            // طلب ملء الشاشة بعد التفاعل
            setTimeout(() => {
                requestFullScreen();
                window.fullScreenRequested = true;
            }, 1000);

            // تحديث الوقت كل ثانية
            setInterval(updateCurrentTime, 1000);
            // تحديث البيانات كل 5 دقائق
            setInterval(fetchSchedule, CONFIG.REFRESH_INTERVAL);

            // زر إيقاف التمرير
            document.getElementById('pauseScrollBtn').addEventListener('click', () => {
                scrollPaused = !scrollPaused;
                const icon = document.getElementById('pauseIcon');
                icon.className = scrollPaused ? 'fas fa-play' : 'fas fa-pause';
                if (!scrollPaused) setupAutoScroll();
            });
        });

        // تفعيل ملء الشاشة عند أي تفاعل
        document.addEventListener('click', () => !window.fullScreenRequested && requestFullScreen());
        document.addEventListener('keydown', () => !window.fullScreenRequested && requestFullScreen());

        // تنظيف الموارد
        window.addEventListener('beforeunload', () => {
            if (observer) observer.disconnect();
            cancelAnimationFrame(animationFrame);
        });
    </script>
</body>
</html>
