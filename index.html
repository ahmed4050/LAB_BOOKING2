<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>نظام حجوزات المختبر - مدرسة الحوراء</title>
    <meta http-equiv="refresh" content="60">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #3498db;
            --secondary-color: #2980b9;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --current-period-color: #ffd700;
            --current-period-bg: rgba(255, 215, 0, 0.15);
            --next-period-color: #87CEEB;
            --next-period-bg: rgba(135, 206, 235, 0.1);
        }

        html, body {
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 15px;
            position: relative;
        }

        @media (min-width: 1024px) {
            html, body {
                height: 100vh;
                overflow: hidden;
                align-items: center;
            }
        }

        .tv-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at 50% 50%, #1a237e, #000000);
            opacity: 0.15;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 1920px;
        }

        .header {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 12px 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.5);
            flex-shrink: 0;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .qr-code {
            flex-shrink: 0;
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 2px solid var(--primary-color);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .qr-code:hover {
            transform: scale(1.05);
        }

        .qr-code img {
            display: block;
            width: 70px;
            height: 70px;
            object-fit: contain;
        }

        @media (min-width: 768px) {
            .qr-code img {
                width: 90px;
                height: 90px;
            }
        }

        @media (min-width: 1200px) {
            .qr-code img {
                width: 100px;
                height: 100px;
            }
        }

        .school-name-container {
            flex: 1;
            text-align: center;
        }

        .school-name {
            margin-bottom: 8px;
        }

        .school-name h1 {
            color: #2c3e50;
            font-size: clamp(1.6rem, 3.5vw, 2.5rem);
            font-weight: 800;
            margin-bottom: 5px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .school-name h1 i {
            color: #e74c3c;
            animation: pulse 2s infinite;
            font-size: clamp(1.2rem, 2.5vw, 1.8rem);
        }

        .school-name .subtitle {
            color: #7f8c8d;
            font-size: clamp(0.8rem, 1.5vw, 1.1rem);
            font-weight: 400;
            border-bottom: 2px solid var(--primary-color);
            display: inline-block;
            padding-bottom: 4px;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 8px 20px;
            border-radius: 15px;
            color: white;
            flex-wrap: wrap;
            gap: 10px;
            font-size: clamp(0.8rem, 1.5vw, 1rem);
            margin-top: 10px;
        }

        .date-info, .update-info, .current-time-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .current-time-info {
            background: rgba(255, 215, 0, 0.2);
            padding: 5px 15px;
            border-radius: 30px;
            border: 1px solid #ffd700;
        }

       /* شريط الحصص المتحرك - من اليسار إلى اليمين */
.periods-marquee {
    background: linear-gradient(135deg, #2c3e50, #34495e);
    border-radius: 40px;
    padding: 8px 15px;
    color: white;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.1);
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
    font-size: 1rem;
}

.marquee-container {
    display: flex;
    align-items: center;
    gap: 30px;
    animation: scrollLeftToRight 70s linear infinite;
    white-space: nowrap;
    direction: ltr;
    width: fit-content;
}

.marquee-container:hover {
    animation-play-state: paused;
}

@keyframes scrollLeftToRight {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

        .marquee-item {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 5px 18px;
            border-radius: 35px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.95rem;
        }

        .marquee-item.current {
            background: linear-gradient(135deg, #ffd700, #f39c12);
            color: #2c3e50;
            font-weight: 700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .marquee-item.next {
            background: linear-gradient(135deg, #87CEEB, #00BFFF);
            color: #2c3e50;
            font-weight: 600;
        }

        .marquee-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .marquee-text {
            font-size: 1rem;
        }

        .stats-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    flex-shrink: 0;
}

.stat-card {
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 12px 15px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    border: 2px solid rgba(255, 255, 255, 0.8);
}

.stat-icon {
    width: 45px;
    height: 45px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: white;
    flex-shrink: 0;
}

/* عرض الرقم بجانب النص */
.stat-details {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
}

.stat-details h3 {
    color: #7f8c8d;
    font-size: clamp(0.9rem, 1.5vw, 1.1rem);
    font-weight: 500;
    margin: 0;
}

.stat-details .stat-number {
    color: #2c3e50;
    font-size: clamp(1.3rem, 2.5vw, 1.8rem);
    font-weight: 800;
    line-height: 1;
}

        .table-container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.8);

            display: flex;
            flex-direction: column;
            overflow: hidden;

            overflow-x: hidden;

        .table-responsive::-webkit-scrollbar {

            padding: 12px 8px;

        .current-period {

        .current-period td {
            background: var(--current-period-bg) !important;

        .next-period {

            border-right: 4px solid var(--next-period-color) !important;

        .time-badge {

            border-radius: 15px;
            font-size: 0.75rem;

        .booked {

        .booked td {

        }
        .booked .time-badge {

            color: white;
        }

        .experiment-badge {
            display: inline-block;
            background: rgba(52, 152, 219, 0.1);
            padding: 4px 10px;
            border-radius: 25px;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            font-size: 0.8rem;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;

        .booked .experiment-badge {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-color: white;
        }

        .empty-cell { 
            color: #95a5a6; 
            font-style: italic; 
            background: #f8f9fa !important;
        }

        /* شريط الأمن والسلامة المتحرك */
        .safety-marquee {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border-radius: 40px;
            padding: 10px 15px;
            color: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
            margin: 5px 0;
        }

        .safety-marquee-container {
            display: flex;
            align-items: center;
            gap: 20px;
            animation: scrollSafety 30s linear infinite;
            white-space: nowrap;
            direction: ltr;
            width: fit-content;
        }

        .safety-marquee-container:hover {
            animation-play-state: paused;
        }

        @keyframes scrollSafety {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .safety-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
        }

        .safety-text {
            font-size: 1.3rem;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }

        /* تحسين للشاشات الصغيرة */
        @media (max-width: 768px) {
            .safety-text {
                font-size: 1rem;
            }
            
            .safety-icon {
                width: 30px;
                height: 30px;
                font-size: 1rem;
            }
        }

        .footer {
            text-align: center;
            color: white;
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            backdrop-filter: blur(5px);
            flex-shrink: 0;
        }

        .footer p {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            font-size: clamp(0.7rem, 1.1vw, 0.9rem);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .break-row {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d) !important;
        }
        
        .break-row td {
            background: transparent !important;
            color: white !important;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRASDUlO20FT6MI1NVQKSAKF4EBY1cVP0usamiNw37msjkFklLvqyUHtomJMOQu9_YfOERTok-X9ti/pub?output=csv';
        
        const timeTable = [
            { period: "الطابور", duration: 10, times: [
                { start: "7:00", end: "7:10" },
                { start: "7:10", end: "7:20" }
            ]},
            { period: "الأولى", duration: 40, times: [
                { start: "7:10", end: "7:50" },
                { start: "7:20", end: "8:00" }
            ]},
            { period: "الثانية", duration: 40, times: [
                { start: "7:55", end: "8:35" },
                { start: "8:05", end: "8:45" }
            ]},
            { period: "الثالثة", duration: 40, times: [
                { start: "8:40", end: "9:20" },
                { start: "8:50", end: "9:30" }
            ]},
            { period: "الرابعة", duration: 40, times: [
                { start: "9:25", end: "10:05" },
                { start: "9:35", end: "10:15" }
            ]},
            { period: "الفسحة", duration: 20, times: [
                { start: "10:05", end: "10:25" },
                { start: "10:15", end: "10:35" }
            ]},
            { period: "الخامسة", duration: 40, times: [
                { start: "10:25", end: "11:05" },
                { start: "10:35", end: "11:15" }
            ]},
            { period: "السادسة", duration: 40, times: [
                { start: "11:10", end: "11:50" },
                { start: "11:20", end: "12:00" }
            ]},
            { period: "السابعة", duration: 40, times: [
                { start: "11:55", end: "12:35" },
                { start: "12:05", end: "12:45" }
            ]},
            { period: "الثامنة", duration: 40, times: [
                { start: "12:40", end: "1:20" },
                { start: "12:50", end: "1:30" }
            ]}
        ];

        let scrollInterval;
        let currentBookings = {};

        function timeToMinutes(timeStr) {
            if (!timeStr) return 0;
            timeStr = timeStr.trim();
            let [hours, minutes] = timeStr.split(':').map(Number);
            if (isNaN(hours) || isNaN(minutes)) {
                console.error('تنسيق وقت غير صالح:', timeStr);
                return 0;
            }
            if (hours < 7 && hours > 0) {
                hours += 12;
            }
            return hours * 60 + minutes;
        }

        function getCurrentTimeInMinutes() {
            const now = new Date();
            return now.getHours() * 60 + now.getMinutes();
        }

        function getCurrentAndNextPeriod() {
            const currentTimeInMinutes = getCurrentTimeInMinutes();
            const isSecondShift = currentTimeInMinutes >= 12 * 60;
            
            let currentPeriod = null;
            let nextPeriod = null;

            for (let i = 0; i < timeTable.length; i++) {
                const period = timeTable[i];
                const timeSlot = period.times[isSecondShift ? 1 : 0];
                
                const startMinutes = timeToMinutes(timeSlot.start);
                const endMinutes = timeToMinutes(timeSlot.end);
                
                if (currentTimeInMinutes >= startMinutes && currentTimeInMinutes < endMinutes) {
                    currentPeriod = {
                        index: i,
                        period: period.period,
                        start: timeSlot.start,
                        end: timeSlot.end,
                        shift: isSecondShift ? 2 : 1
                    };
                    break;
                }
            }
            
            if (currentPeriod) {
                for (let i = currentPeriod.index + 1; i < timeTable.length; i++) {
                    const period = timeTable[i];
                    const timeSlot = period.times[isSecondShift ? 1 : 0];
                    const startMinutes = timeToMinutes(timeSlot.start);
                    
                    if (startMinutes > currentTimeInMinutes) {
                        nextPeriod = {
                            index: i,
                            period: period.period,
                            start: timeSlot.start,
                            end: timeSlot.end,
                            shift: isSecondShift ? 2 : 1
                        };
                        break;
                    }
                }
            }
            
            return { currentPeriod, nextPeriod };
        }

        function updateMarquee() {
            const marqueeContainer = document.getElementById('marqueeContainer');
            const { currentPeriod, nextPeriod } = getCurrentAndNextPeriod();
            
            if (!currentPeriod) {
                marqueeContainer.innerHTML = `
                    <div class="marquee-item">
                        <span class="marquee-icon"><i class="fas fa-clock"></i></span>
                        <span class="marquee-text">لا توجد حصة حالياً</span>
                    </div>
                    <div class="marquee-item">
                        <span class="marquee-icon"><i class="fas fa-hourglass-half"></i></span>
                        <span class="marquee-text">⏳ الحصة التالية: ${nextPeriod ? nextPeriod.period : 'غير معروفة'}</span>
                    </div>
                    <span style="color: #ffd700; font-size: 1.5rem;">✦</span>
                `;
                return;
            }

            const currentBooking = currentBookings[currentPeriod.period];
            const nextBooking = nextPeriod ? currentBookings[nextPeriod.period] : null;

            const currentLesson = currentBooking ? currentBooking.lesson : 'لا يوجد حجز';
            const nextLesson = nextBooking ? nextBooking.lesson : 'لا يوجد حجز';

            let marqueeHTML = '';
            for (let i = 0; i < 3; i++) {
                marqueeHTML += `
                    <div class="marquee-item current">
                        <span class="marquee-icon"><i class="fas fa-play-circle"></i></span>
                        <span class="marquee-text">🔴 الحصة الحالية: ${currentPeriod.period} | عنوان الدرس: ${currentLesson}</span>
                    </div>
                    <div class="marquee-item next">
                        <span class="marquee-icon"><i class="fas fa-hourglass-half"></i></span>
                        <span class="marquee-text">⏳ الحصة التالية: ${nextPeriod ? nextPeriod.period : 'لا توجد'} | عنوان الدرس: ${nextLesson}</span>
                    </div>
                    <span style="color: #ffd700; font-size: 1.5rem;">✦</span>
                `;
            }
            
            marqueeContainer.innerHTML = marqueeHTML;
        }

        function updateCurrentTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('currentTime').textContent = timeStr;
        }

        function startAutoScroll() {
            const wrapper = document.getElementById('tableWrapper');
            if (!wrapper) return;
            if (scrollInterval) clearInterval(scrollInterval);

            let scrollAmount = 0;
            let direction = 1;

            scrollInterval = setInterval(() => {
                const maxScroll = wrapper.scrollHeight - wrapper.clientHeight;
                if (maxScroll <= 0) return;

                scrollAmount += direction * 0.8;
                
                if (scrollAmount > maxScroll) {
                    scrollAmount = maxScroll;
                    direction = 0;
                    setTimeout(() => { direction = -1; }, 3000);
                } else if (scrollAmount < 0) {
                    scrollAmount = 0;
                    direction = 0;
                    setTimeout(() => { direction = 1; }, 3000);
                }
                
                wrapper.scrollTop = scrollAmount;
            }, 30);
        }

        async function fetchSchedule() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split(',').map(cell => cell.trim()));
                
                const now = new Date();
                const today = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}`;
                
                document.getElementById('currentDate').innerHTML = `<i class="fas fa-calendar-day"></i> ${now.toLocaleDateString('ar-SA', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'})}`;
                updateCurrentTime();

                let bookedCount = 0;
                const { currentPeriod, nextPeriod } = getCurrentAndNextPeriod();
                
                currentBookings = {};

                let html = '<table class="schedule-table"><thead><tr>' +
                          '<th>#</th><th>الحصة</th><th>التوقيت</th><th>المدة</th>' +
                          '<th>الصف</th><th>المادة</th><th>المعلمة</th><th>عنوان الدرس</th>' +
                          '</tr></thead><tbody>';

                const isSecondShift = now.getHours() >= 12;
                
                const actualPeriods = timeTable.filter(p => p.period !== 'الطابور' && p.period !== 'الفسحة');
                const totalActualPeriods = actualPeriods.length;

                timeTable.forEach((period, index) => {
                    const timeSlot = period.times[isSecondShift ? 1 : 0];
                    const timeDisplay = `${timeSlot.start} - ${timeSlot.end}`;
                    
                    let booking = null;
                    for (let i = 1; i < rows.length; i++) {
                        if (rows[i].length < 5) continue;
                        
                        const rowDate = rows[i][2];
                        const rowPeriod = rows[i][3];
                        
                        if (rowDate === today && rowPeriod === period.period) {
                            booking = {
                                teacher: rows[i][4] || "غير محدد",
                                subject: rows[i][5] || "غير محدد",
                                grade: rows[i][6] || "غير محدد",
                                lesson: rows[i][7] || "غير محدد"
                            };
                            
                            if (period.period !== 'الطابور' && period.period !== 'الفسحة') {
                                bookedCount++;
                            }
                            
                            currentBookings[period.period] = booking;
                            break;
                        }
                    }

                    let rowClass = '';
                    if (currentPeriod && currentPeriod.index === index) {
                        rowClass = 'current-period';
                    } else if (nextPeriod && nextPeriod.index === index) {
                        rowClass = 'next-period';
                    } else if (period.period === 'الطابور' || period.period === 'الفسحة') {
                        rowClass = 'break-row';
                    } else if (booking) {
                        rowClass = 'booked';
                    }

                    html += `<tr class="${rowClass}">`;
                    html += `<td>${index + 1}</td>`;
                    html += `<td><strong>${period.period}</strong></td>`;
                    html += `<td><span class="time-badge"><i class="fas fa-clock"></i> ${timeDisplay}</span></td>`;
                    html += `<td>${period.duration} د</td>`;

                    if (booking) {
                        html += `<td>${booking.grade}</td>`;
                        html += `<td>${booking.subject}</td>`;
                        html += `<td><i class="fas fa-user-tie"></i> ${booking.teacher}</td>`;
                        html += `<td><span class="experiment-badge"><i class="fas fa-flask"></i> ${booking.lesson}</span></td>`;
                    } else if (period.period === 'الطابور' || period.period === 'الفسحة') {
                        html += `<td colspan="4" class="empty-cell"><i class="fas fa-coffee"></i> استراحة</td>`;
                    } else {
                        html += `<td colspan="4" class="empty-cell"><i class="fas fa-check-circle"></i> متاح للحجز</td>`;
                    }

                    html += '</tr>';
                });

                html += '</tbody></table>';
                
                document.getElementById('tableContent').innerHTML = html;
                document.getElementById('bookedCount').textContent = bookedCount;
                document.getElementById('emptyCount').textContent = totalActualPeriods - bookedCount;
                document.getElementById('totalPeriods').textContent = totalActualPeriods;

                updateMarquee();

                if (currentPeriod) {
                    setTimeout(() => {
                        const wrapper = document.getElementById('tableWrapper');
                        const rows = wrapper.querySelectorAll('tr');
                        for (let i = 0; i < rows.length; i++) {
                            if (rows[i].classList.contains('current-period')) {
                                rows[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                                break;
                            }
                        }
                    }, 500);
                }

                setTimeout(startAutoScroll, 2000);

            } catch (e) {
                console.error('خطأ في تحميل البيانات:', e);
                document.getElementById('tableContent').innerHTML = '<p style="text-align:center; padding:20px; color:#e74c3c;"><i class="fas fa-exclamation-triangle"></i> خطأ في تحميل البيانات...</p>';
            }
        }

        // دالة لطلب ملء الشاشة تلقائياً
        function requestFullScreen() {
            const docElm = document.documentElement;
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen();
            } else if (docElm.mozRequestFullScreen) { /* Firefox */
                docElm.mozRequestFullScreen();
            } else if (docElm.webkitRequestFullScreen) { /* Chrome, Safari and Opera */
                docElm.webkitRequestFullScreen();
            } else if (docElm.msRequestFullscreen) { /* IE/Edge */
                docElm.msRequestFullscreen();
            }
        }

        // محاولة تفعيل ملء الشاشة عند أول ضغطة أو تفاعل مع الصفحة
        document.addEventListener("click", function() {
            if (!window.fullScreenRequested) {
                requestFullScreen();
                window.fullScreenRequested = true;
            }
        });
        document.addEventListener("keydown", function() {
            if (!window.fullScreenRequested) {
                requestFullScreen();
                window.fullScreenRequested = true;
            }
        });

        setInterval(() => {
            updateCurrentTime();
            updateMarquee();
        }, 1000);

        setInterval(() => {
            fetchSchedule();
        }, 60000);

        document.addEventListener('DOMContentLoaded', () => {
            fetchSchedule();
            // محاولة إطلاق ملء الشاشة بعد ثانية من التحميل
            setTimeout(() => {
                requestFullScreen();
                window.fullScreenRequested = true;
            }, 1000);
        });
    </script>
</body>
</html>
