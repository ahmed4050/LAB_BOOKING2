<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نظام حجوزات المختبر - مدرسة الحوراء</title>
    <meta http-equiv="refresh" content="300" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #3498db;
            --card-bg: rgba(255, 255, 255, 0.98);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; padding: 15px;
        }
        .container { width: 100%; height: 100%; display: flex; flex-direction: column; gap: 12px; max-width: 1920px; z-index: 1; }
        
        /* التنسيقات العامة */
        .header, .table-container, .stat-card, .footer { background: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .header { padding: 15px 25px; flex-shrink: 0; }
        .header-content { display: flex; align-items: center; justify-content: space-between; }
        .school-name h1 { color: #2c3e50; font-size: 2.2rem; font-weight: 800; }
        
        /* شريط التنبيهات */
        .safety-marquee { background: #e74c3c; border-radius: 40px; padding: 12px; overflow: hidden; margin: 5px 0; flex-shrink: 0; }
        .safety-marquee-container { display: flex; white-space: nowrap; animation: scrollSafety 60s linear infinite; width: fit-content; }
        @keyframes scrollSafety { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .safety-text { color: white; font-size: 1.3rem; font-weight: bold; padding: 0 50px; }

        /* الجدول */
        .table-container { flex: 1; padding: 15px; overflow: hidden; }
        .table-responsive { width: 100%; height: 100%; overflow-y: auto; scrollbar-width: none; }
        .schedule-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .schedule-table th { background: var(--primary-color); color: white; padding: 12px; position: sticky; top: 0; }
        .schedule-table td { background: #f8f9fa; padding: 12px; text-align: center; border: 1px solid #eee; }
        .booked { background: #27ae60 !important; color: white !important; }
        .booked td { background: transparent !important; color: white !important; }

        /* التذييل المحدث */
        .footer { padding: 12px 30px; flex-shrink: 0; }
        .footer-content { display: flex; justify-content: space-between; align-items: center; color: #2c3e50; font-weight: bold; }

        .qr-code img { width: 80px; height: 80px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <div class="qr-code"><img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://ahmed4050.github.io/LAB_BOOKING2/" alt="QR"></div>
                <div class="school-name"><h1>مختبر مدرسة الحوراء</h1></div>
                <div id="timeBox" style="text-align: left;">
                    <div id="currentTime" style="font-size: 1.5rem; font-weight: bold; color: #2980b9;">--:--</div>
                    <div id="currentDate" style="font-size: 0.9rem;"></div>
                </div>
            </div>
        </div>

        <div class="table-container">
            <div id="tableWrapper" class="table-responsive">
                <div id="tableContent">جاري تحميل الحجوزات...</div>
            </div>
        </div>

        <div class="safety-marquee">
            <div class="safety-marquee-container" id="safetyMarqueeContainer">
                <span class="safety-text">جاري تحميل تنبيهات السلامة...</span>
            </div>
        </div>

        <div class="footer">
            <div class="footer-content">
                <span><i class="fas fa-chalkboard-teacher"></i> إشراف فنية المختبر أ.نادية السيابي</span>
                <span>جميع الحقوق محفوظة لمدرسة الحوراء 2026 <i class="fas fa-copyright"></i></span>
            </div>
        </div>
    </div>

    <script>
        var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRASDUlO20FT6MI1NVQKSAKF4EBY1cVP0usamiNw37msjkFklLvqyUHtomJMOQu9_YfOERTok-X9ti/pub?output=csv';
        
        function fetchSchedule() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', csvUrl + '&t=' + new Date().getTime(), true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var rows = xhr.responseText.split(/\r?\n/).map(function(line) {
                        return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // تقسيم ذكي للـ CSV
                    });

                    var now = new Date();
                    var today = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0');
                    
                    var currentBookings = {};
                    var dailyNotes = []; // مصفوفة لتجميع كل التنبيهات

                    for (var i = 1; i < rows.length; i++) {
                        var row = rows[i];
                        if (!row[2]) continue;
                        
                        var cleanDate = row[2].replace(/"/g, '').trim();
                        
                        if (cleanDate === today) {
                            // 1. تجميع الحجوزات
                            var period = row[3].replace(/"/g, '').trim();
                            currentBookings[period] = {
                                teacher: row[4].replace(/"/g, ''),
                                subject: row[5].replace(/"/g, ''),
                                grade: row[6].replace(/"/g, ''),
                                lesson: row[7].replace(/"/g, '')
                            };

                            // 2. تجميع التنبيهات (من العمود التاسع - Index 8)
                            if (row[8]) {
                                var note = row[8].replace(/"/g, '').trim();
                                if (note !== "" && dailyNotes.indexOf(note) === -1) {
                                    dailyNotes.push(note);
                                }
                            }
                        }
                    }
                    renderUI(currentBookings, dailyNotes);
                }
            };
            xhr.send();
        }

        function renderUI(bookings, notes) {
            // رسم الجدول
            var periods = ["الأولى", "الثانية", "الثالثة", "الرابعة", "الخامسة", "السادسة", "السابعة", "الثامنة"];
            var html = '<table class="schedule-table"><thead><tr><th>الحصة</th><th>الصف</th><th>المادة</th><th>المعلمة</th><th>الدرس</th></tr></thead><tbody>';
            
            periods.forEach(function(p) {
                var b = bookings[p];
                var cls = b ? 'booked' : '';
                html += '<tr class="'+cls+'"><td>'+p+'</td>';
                if(b) {
                    html += '<td>'+b.grade+'</td><td>'+b.subject+'</td><td>'+b.teacher+'</td><td>'+b.lesson+'</td>';
                } else {
                    html += '<td colspan="4">شاغرة</td>';
                }
                html += '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById('tableContent').innerHTML = html;

            // تحديث شريط التنبيهات (تجميع الكل)
            var marquee = document.getElementById('safetyMarqueeContainer');
            if (notes.length > 0) {
                var content = notes.join(' ✨ '); // الربط بين التنبيهات برمز مميز
                // تكرار النص لضمان استمرارية الحركة في المتصفح
                marquee.innerHTML = '<span class="safety-text">⚠️ ' + content + ' ⚠️</span>' + 
                                   '<span class="safety-text">⚠️ ' + content + ' ⚠️</span>';
            } else {
                marquee.innerHTML = '<span class="safety-text">⚠️ مختبر مدرسة الحوراء يرحب بكم - نتمنى لكم تجارب علمية ممتعة وآمنة ⚠️</span>';
            }
            
            startScroll();
        }

        function startScroll() {
            var div = document.getElementById('tableWrapper');
            var speed = 1;
            if (window.scrollInterval) clearInterval(window.scrollInterval);
            window.scrollInterval = setInterval(function() {
                div.scrollTop += speed;
                if (div.scrollTop >= (div.scrollHeight - div.offsetHeight)) {
                    setTimeout(function() { div.scrollTop = 0; }, 3000);
                }
            }, 50);
        }

        function updateClock() {
            var n = new Date();
            document.getElementById('currentTime').textContent = n.getHours() + ":" + String(n.getMinutes()).padStart(2, '0');
            document.getElementById('currentDate').textContent = n.toLocaleDateString('ar-OM', {weekday:'long', day:'numeric', month:'long'});
        }

        updateClock();
        fetchSchedule();
        setInterval(updateClock, 1000);
        setInterval(fetchSchedule, 300000);
    </script>
</body>
</html>
