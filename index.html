<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>نظام حجوزات المختبر - مدرسة الحوراء</title>
    <meta http-equiv="refresh" content="300">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #3498db;
            --secondary-color: #2980b9;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
        }

        html, body {
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 15px;
            position: relative;
        }

        @media (min-width: 1024px) {
            html, body {
                height: 100vh;
                overflow: hidden;
                align-items: center;
            }
        }

        .tv-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at 50% 50%, #1a237e, #000000);
            opacity: 0.15;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 1920px;
        }

        .header {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 15px 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.5);
            flex-shrink: 0;
        }

        .school-name {
            text-align: center;
            margin-bottom: 10px;
        }

        .school-name h1 {
            color: #2c3e50;
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
        }

        .school-name h1 i {
            color: #e74c3c;
            margin: 0 10px;
            animation: pulse 2s infinite;
        }

        .school-name .subtitle {
            color: #7f8c8d;
            font-size: clamp(0.9rem, 1.8vw, 1.3rem);
            font-weight: 400;
            border-bottom: 3px solid var(--primary-color);
            display: inline-block;
            padding-bottom: 5px;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 12px 25px;
            border-radius: 18px;
            color: white;
            flex-wrap: wrap;
            gap: 15px;
            font-size: clamp(0.9rem, 1.8vw, 1.2rem);
        }

        .date-info, .update-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            flex-shrink: 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        .stat-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            flex-shrink: 0;
        }

        .stat-details h3 {
            color: #7f8c8d;
            font-size: clamp(0.9rem, 1.5vw, 1.1rem);
            margin-bottom: 5px;
            font-weight: 500;
        }

        .stat-details .stat-number {
            color: #2c3e50;
            font-size: clamp(1.5rem, 3vw, 2.2rem);
            font-weight: 800;
        }

        .table-container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.8);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .table-responsive {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none; /* إخفاء شريط التمرير لمتصفحات فايرفوكس */
        }

        .table-responsive::-webkit-scrollbar {
            display: none; /* إخفاء شريط التمرير لمتصفحات كروم */
        }

        .schedule-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
            table-layout: fixed;
        }

        .schedule-table th {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 15px 10px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .schedule-table th:first-child { border-radius: 15px 0 0 15px; width: 60px; }
        .schedule-table th:last-child { border-radius: 0 15px 15px 0; }

        .schedule-table td {
            background: white;
            padding: 15px 12px;
            text-align: center;
            font-size: clamp(1rem, 1.6vw, 1.3rem);
        }

        .schedule-table td:first-child { border-radius: 15px 0 0 15px; font-weight: bold; }
        .schedule-table td:last-child { border-radius: 0 15px 15px 0; }

        .booked { background: linear-gradient(135deg, #27ae60, #2ecc71) !important; color: white !important; }
        .booked td { background: transparent !important; color: white !important; }

        .experiment-badge {
            display: inline-block;
            background: rgba(52, 152, 219, 0.1);
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
        }

        .booked .experiment-badge {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-color: white;
        }

        .empty-cell { color: #bdc3c7; font-style: italic; }

        .footer {
            text-align: center;
            color: white;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 30px;
            flex-shrink: 0;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="tv-background"></div>
    <div class="container">
        <div class="header">
            <div class="school-name">
                <h1><i class="fas fa-flask"></i> مدرسة الحوراء <i class="fas fa-microscope"></i></h1>
                <div class="subtitle">نظام حجوزات المختبر المدرسي</div>
            </div>
            <div class="info-bar">
                <div class="date-info" id="currentDate"></div>
                <div class="update-info"><i class="fas fa-sync-alt"></i> تحديث تلقائي كل 5 دقائق</div>
            </div>
        </div>

        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-list-ol"></i></div>
                <div class="stat-details"><h3>إجمالي الحصص</h3><div class="stat-number" id="totalPeriods">8</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                <div class="stat-details"><h3>المحجوزة</h3><div class="stat-number" id="bookedCount">0</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-door-open"></i></div>
                <div class="stat-details"><h3>الشاغرة</h3><div class="stat-number" id="emptyCount">8</div></div>
            </div>
        </div>

        <div class="table-container">
            <div id="tableWrapper" class="table-responsive">
                <div id="tableContent">
                    </div>
            </div>
        </div>

        <div class="footer">
    <p style="display: flex; justify-content: space-between; width: 100%;">
        <span>إشراف فنية المختبر أ.نادية السيابي</span>
        <span>جميع الحقوق محفوظة لمدرسة الحوراء © 2026</span>
    </p>
</div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRASDUlO20FT6MI1NVQKSAKF4EBY1cVP0usamiNw37msjkFklLvqyUHtomJMOQu9_YfOERTok-X9ti/pub?output=csv';
        const schoolPeriods = ["الأولى", "الثانية", "الثالثة", "الرابعة", "الخامسة", "السادسة", "السابعة", "الثامنة"];
        let scrollInterval;

        function startAutoScroll() {
            const wrapper = document.getElementById('tableWrapper');
            if (!wrapper) return;
            if (scrollInterval) clearInterval(scrollInterval);

            let scrollAmount = 0;
            let direction = 1;

            scrollInterval = setInterval(() => {
                const maxScroll = wrapper.scrollHeight - wrapper.clientHeight;
                if (maxScroll <= 0) return;

                scrollAmount += direction * 0.8; // سرعة التمرير
                wrapper.scrollTop = scrollAmount;

                if (scrollAmount >= maxScroll) {
                    direction = 0;
                    setTimeout(() => { direction = -1; }, 3000); // انتظار 3 ثواني عند النهاية
                } else if (scrollAmount <= 0) {
                    direction = 0;
                    setTimeout(() => { direction = 1; }, 3000); // انتظار 3 ثواني عند البداية
                }
            }, 30);
        }

        async function fetchSchedule() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split(',').map(cell => cell.trim()));
                
                const now = new Date();
                const today = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}`;
                document.getElementById('currentDate').innerHTML = `<i class="fas fa-calendar-day"></i> ${now.toLocaleDateString('ar-SA', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'})}`;

                let bookedCount = 0;
                let html = '<table class="schedule-table"><thead><tr><th>#</th><th>الحصة</th><th>الصف</th><th>المادة</th><th>المعلمة</th><th>عنوان الدرس</th></tr></thead><tbody>';

                schoolPeriods.forEach((period, index) => {
                    let booking = null;
                    for (let i = 1; i < rows.length; i++) {
                        if (rows[i][2] === today && rows[i][3] === period) {
                            booking = { teacher: rows[i][4], subject: rows[i][5], grade: rows[i][6], lesson: rows[i][7] };
                            bookedCount++;
                            break;
                        }
                    }

                    if (booking) {
                        html += `<tr class="booked">
                            <td>${index + 1}</td>
                            <td>${period}</td>
                            <td>${booking.grade}</td>
                            <td>${booking.subject}</td>
                            <td>${booking.teacher}</td>
                            <td><span class="experiment-badge">${booking.lesson}</span></td>
                        </tr>`;
                    } else {
                        html += `<tr>
                            <td>${index + 1}</td>
                            <td>${period}</td>
                            <td colspan="4" class="empty-cell"><i class="fas fa-check-circle"></i> متاح للحجز</td>
                        </tr>`;
                    }
                });

                html += '</tbody></table>';
                document.getElementById('tableContent').innerHTML = html;
                document.getElementById('bookedCount').textContent = bookedCount;
                document.getElementById('emptyCount').textContent = schoolPeriods.length - bookedCount;

                setTimeout(startAutoScroll, 2000);
            } catch (e) {
                document.getElementById('tableContent').innerHTML = '<p style="text-align:center; padding:20px;">خطأ في تحميل البيانات...</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchSchedule();
            setInterval(fetchSchedule, 300000);
        });
    </script>
</body>
</html>
