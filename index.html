<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام حجوزات المختبر - مدرسة الحوراء</title>
    <meta http-equiv="refresh" content="300">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg:        #06111f;
            --surface:   rgba(8, 25, 50, 0.82);
            --border:    rgba(0, 200, 255, 0.16);
            --cyan:      #00c8ff;
            --blue:      #0066ff;
            --violet:    #7c3aed;
            --green:     #00e676;
            --green2:    #00c853;
            --amber:     #ffc107;
            --red:       #ff4757;
            --txt:       #ddeeff;
            --txt-soft:  #5a88aa;
            --row-empty: rgba(8, 20, 40, 0.55);
            --row-book:  rgba(0, 200, 100, 0.10);
            --glow:      0 0 40px rgba(0,200,255,0.10);
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        html,body{
            width:100vw;height:100vh;overflow:hidden;
            font-family:'Tajawal',sans-serif;
            background:var(--bg);color:var(--txt);
        }

        /* ── BACKGROUND ── */
        .bg{
            position:fixed;inset:0;z-index:0;
            background:
                radial-gradient(ellipse 90% 55% at 50% -5%,  rgba(0,102,255,.17) 0%,transparent 70%),
                radial-gradient(ellipse 45% 45% at 5%  95%,  rgba(124,58,237,.14) 0%,transparent 60%),
                radial-gradient(ellipse 55% 55% at 95% 85%,  rgba(0,200,255,.10) 0%,transparent 60%),
                linear-gradient(170deg,#050e1b 0%,#071525 55%,#050d1a 100%);
        }
        .grid{
            position:fixed;inset:0;z-index:0;
            background-image:
                linear-gradient(rgba(0,200,255,.035) 1px,transparent 1px),
                linear-gradient(90deg,rgba(0,200,255,.035) 1px,transparent 1px);
            background-size:55px 55px;
            animation:gridMove 35s linear infinite;
        }
        @keyframes gridMove{to{background-position:55px 55px;}}

        /* ── WRAPPER ── */
        .wrap{
            position:relative;z-index:1;
            width:100vw;height:100vh;
            display:grid;
            grid-template-rows:auto auto 1fr auto;
            gap:clamp(5px,1vh,14px);
            padding:clamp(8px,1.4vh,18px) clamp(10px,1.8vw,26px);
        }

        /* ── HEADER ── */
        .hdr{
            display:grid;
            grid-template-columns:1fr auto 1fr;
            align-items:center;
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:clamp(12px,1.8vw,22px);
            padding:clamp(8px,1.1vh,14px) clamp(14px,2.2vw,30px);
            backdrop-filter:blur(22px);
            box-shadow:var(--glow),inset 0 1px 0 rgba(255,255,255,0.05);
            position:relative;overflow:hidden;
        }
        .hdr::before{
            content:'';position:absolute;top:0;left:0;right:0;height:2px;
            background:linear-gradient(90deg,transparent,var(--cyan),var(--blue),var(--violet),transparent);
            animation:topLine 5s ease-in-out infinite;
        }
        @keyframes topLine{0%,100%{opacity:.5}50%{opacity:1}}

        .brand{display:flex;flex-direction:column;align-items:center;gap:3px;}
        .brand-title{
            font-size:clamp(1.5rem,3.2vw,3rem);font-weight:900;
            background:linear-gradient(130deg,#fff 15%,var(--cyan) 55%,var(--blue));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
            line-height:1.1;
        }
        .brand-sub{
            font-size:clamp(.65rem,1.3vw,1.1rem);color:var(--txt-soft);
            font-weight:400;letter-spacing:.06em;
        }

        .orbs{display:flex;gap:clamp(8px,1.5vw,20px);}
        .orb{
            width:clamp(34px,4.5vw,58px);height:clamp(34px,4.5vw,58px);
            border-radius:50%;display:flex;align-items:center;justify-content:center;
            font-size:clamp(.9rem,1.7vw,1.6rem);
            border:1.5px solid var(--border);
            animation:orbBeat 3.5s ease-in-out infinite;
        }
        .orb:nth-child(1){background:radial-gradient(circle,rgba(0,200,255,.2),rgba(0,200,255,.04));color:var(--cyan);animation-delay:0s}
        .orb:nth-child(2){background:radial-gradient(circle,rgba(0,102,255,.2),rgba(0,102,255,.04));color:var(--blue);animation-delay:1.1s}
        .orb:nth-child(3){background:radial-gradient(circle,rgba(124,58,237,.2),rgba(124,58,237,.04));color:var(--violet);animation-delay:2.2s}
        @keyframes orbBeat{0%,100%{transform:scale(1)}50%{transform:scale(1.08);box-shadow:0 0 14px 2px rgba(0,200,255,.22)}}

        .hdr-date{display:flex;flex-direction:column;align-items:flex-start;gap:4px;}
        .dt-lbl{font-size:clamp(.55rem,1vw,.85rem);color:var(--txt-soft);}
        .dt-val{font-size:clamp(.75rem,1.5vw,1.25rem);font-weight:700;color:var(--cyan);}
        .live{
            display:inline-flex;align-items:center;gap:6px;margin-top:5px;
            background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.28);
            color:var(--green);padding:3px 11px;border-radius:40px;
            font-size:clamp(.5rem,.9vw,.8rem);font-weight:600;
        }
        .dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:blink 1.4s ease-in-out infinite;}
        @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.7)}}

        /* ── STATS ── */
        .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(7px,1.3vw,16px);}
        .sc{
            background:var(--surface);border:1px solid var(--border);
            border-radius:clamp(9px,1.3vw,16px);
            padding:clamp(8px,1.1vh,14px) clamp(10px,1.6vw,22px);
            display:flex;align-items:center;gap:clamp(9px,1.3vw,18px);
            backdrop-filter:blur(16px);box-shadow:var(--glow);
            position:relative;overflow:hidden;
        }
        .sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
        .sc:nth-child(1)::after{background:linear-gradient(90deg,var(--blue),var(--cyan));}
        .sc:nth-child(2)::after{background:linear-gradient(90deg,var(--green2),var(--green));}
        .sc:nth-child(3)::after{background:linear-gradient(90deg,#ff8f00,var(--amber));}

        .si{
            width:clamp(34px,4vw,54px);height:clamp(34px,4vw,54px);
            border-radius:clamp(7px,.9vw,12px);
            display:flex;align-items:center;justify-content:center;
            font-size:clamp(.9rem,1.6vw,1.5rem);flex-shrink:0;
        }
        .sc:nth-child(1) .si{background:rgba(0,102,255,.18);color:var(--cyan);}
        .sc:nth-child(2) .si{background:rgba(0,230,118,.14);color:var(--green);}
        .sc:nth-child(3) .si{background:rgba(255,193,7,.14);color:var(--amber);}

        .st h3{font-size:clamp(.55rem,1vw,.85rem);color:var(--txt-soft);font-weight:400;margin-bottom:2px;}
        .sn{font-size:clamp(1.3rem,2.8vw,2.4rem);font-weight:900;line-height:1;}
        .sc:nth-child(1) .sn{color:var(--cyan);}
        .sc:nth-child(2) .sn{color:var(--green);}
        .sc:nth-child(3) .sn{color:var(--amber);}

        /* ── TABLE AREA ── */
        .tbox{
            background:var(--surface);border:1px solid var(--border);
            border-radius:clamp(11px,1.8vw,20px);
            backdrop-filter:blur(20px);box-shadow:var(--glow);
            overflow:hidden;display:flex;flex-direction:column;min-height:0;
        }
        .tscroll{
            flex:1;overflow:hidden;
            padding:clamp(7px,1vh,14px) clamp(9px,1.4vw,18px);
            display:flex;flex-direction:column;
        }

        table{
            width:100%;border-collapse:separate;
            border-spacing:0 clamp(3px,.55vh,7px);
            flex:1;table-layout:fixed;
        }

        th{
            background:linear-gradient(135deg,rgba(0,102,255,.28),rgba(0,200,255,.14));
            color:var(--cyan);
            font-size:clamp(.65rem,1.3vw,1rem);font-weight:700;
            padding:clamp(5px,.9vh,11px) clamp(7px,1.1vw,14px);
            text-align:center;letter-spacing:.03em;
            border-top:1px solid rgba(0,200,255,.22);
            border-bottom:1px solid rgba(0,200,255,.22);
        }
        th:first-child{border-radius:9px 0 0 9px;width:4%;}
        th:nth-child(2){width:10%;}
        th:nth-child(3){width:16%;}
        th:nth-child(4){width:14%;}
        th:nth-child(5){width:18%;}
        th:last-child{border-radius:0 9px 9px 0;}

        td{
            padding:clamp(4px,.85vh,11px) clamp(7px,1.1vw,14px);
            font-size:clamp(.68rem,1.28vw,.98rem);
            text-align:center;
            background:var(--row-empty);
            color:var(--txt-soft);
            border-top:1px solid rgba(255,255,255,.025);
            border-bottom:1px solid rgba(255,255,255,.025);
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
            transition:background .25s;
        }
        td:first-child{border-radius:9px 0 0 9px;border-right:2px solid rgba(0,200,255,.13);}
        td:last-child {border-radius:0 9px 9px 0;}

        tr.booked td{
            background:var(--row-book);color:#cdfce9;
            border-top:1px solid rgba(0,230,118,.09);
            border-bottom:1px solid rgba(0,230,118,.09);
        }
        tr.booked td:first-child{border-right:2px solid rgba(0,230,118,.45);}
        tbody tr:hover td{background:rgba(0,102,255,.11);}

        .pb{
            display:inline-flex;width:clamp(22px,2.5vw,34px);height:clamp(22px,2.5vw,34px);
            align-items:center;justify-content:center;border-radius:7px;
            background:linear-gradient(135deg,var(--blue),var(--violet));
            color:#fff;font-weight:800;font-size:clamp(.6rem,1.1vw,.85rem);
            box-shadow:0 3px 10px rgba(0,102,255,.35);
        }
        .pname{font-weight:700;color:var(--txt);font-size:clamp(.68rem,1.25vw,.96rem);}
        tr.booked .pname{color:var(--green);}

        .chip{
            display:inline-flex;align-items:center;gap:5px;
            background:rgba(0,102,255,.13);border:1px solid rgba(0,200,255,.28);
            color:var(--cyan);padding:clamp(2px,.45vh,6px) clamp(7px,1.1vw,14px);
            border-radius:40px;font-weight:600;
            font-size:clamp(.62rem,1.15vw,.92rem);
            max-width:100%;overflow:hidden;text-overflow:ellipsis;
        }
        tr.booked .chip{
            background:rgba(0,230,118,.13);border-color:rgba(0,230,118,.32);color:var(--green);
        }
        .empty-chip{
            display:inline-flex;align-items:center;gap:7px;
            background:rgba(255,255,255,.025);border:1px dashed rgba(255,255,255,.07);
            color:#304d66;padding:clamp(2px,.45vh,6px) clamp(8px,1.2vw,16px);
            border-radius:40px;font-size:clamp(.62rem,1.15vw,.92rem);
        }

        /* ── FOOTER ── */
        .ftr{
            display:flex;align-items:center;justify-content:space-between;
            background:rgba(6,15,30,.75);border:1px solid var(--border);
            border-radius:clamp(9px,1.3vw,15px);
            padding:clamp(4px,.7vh,9px) clamp(13px,1.8vw,22px);
            backdrop-filter:blur(10px);flex-shrink:0;
        }
        .fl{display:flex;align-items:center;gap:9px;color:var(--txt-soft);font-size:clamp(.55rem,1vw,.82rem);}
        .fl i{color:var(--cyan);}
        .fr{display:flex;align-items:center;gap:8px;color:var(--txt-soft);font-size:clamp(.52rem,.95vw,.78rem);}

        .rw{position:relative;width:clamp(22px,2.3vw,34px);height:clamp(22px,2.3vw,34px);flex-shrink:0;}
        .rw svg{width:100%;height:100%;transform:rotate(-90deg);}
        .rw circle{fill:none;stroke-width:3;}
        .rbg{stroke:rgba(255,255,255,.07);}
        .rfill{stroke:var(--cyan);stroke-linecap:round;transition:stroke-dashoffset .9s ease;}

        /* ── ROW ENTRANCE ── */
        @keyframes rowIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
        tbody tr{animation:rowIn .38s ease both;}
        tbody tr:nth-child(1){animation-delay:.04s}tbody tr:nth-child(2){animation-delay:.09s}
        tbody tr:nth-child(3){animation-delay:.14s}tbody tr:nth-child(4){animation-delay:.19s}
        tbody tr:nth-child(5){animation-delay:.24s}tbody tr:nth-child(6){animation-delay:.29s}
        tbody tr:nth-child(7){animation-delay:.34s}tbody tr:nth-child(8){animation-delay:.39s}

        /* ── STATES ── */
        .loading,.errstate{
            display:flex;flex-direction:column;align-items:center;
            justify-content:center;gap:14px;height:100%;color:var(--txt-soft);
            text-align:center;
        }
        .spin{
            width:46px;height:46px;border-radius:50%;
            border:3px solid rgba(0,200,255,.14);
            border-top-color:var(--cyan);border-right-color:var(--blue);
            animation:sp 1s linear infinite;
        }
        @keyframes sp{to{transform:rotate(360deg)}}
        .errstate i{font-size:2.8rem;color:var(--red);}
        .errstate h3{color:var(--red);}
        .rbtn{
            padding:9px 26px;
            background:linear-gradient(135deg,var(--blue),var(--cyan));
            color:#fff;border:none;border-radius:40px;
            font-family:'Tajawal',sans-serif;font-size:.95rem;font-weight:700;
            cursor:pointer;transition:transform .2s,box-shadow .2s;
        }
        .rbtn:hover{transform:scale(1.04);box-shadow:0 8px 20px rgba(0,102,255,.38);}
    </style>
</head>
<body>
<div class="bg"></div>
<div class="grid"></div>

<div class="wrap">

    <!-- HEADER -->
    <header class="hdr">
        <div class="orbs">
            <div class="orb"><i class="fas fa-flask"></i></div>
            <div class="orb"><i class="fas fa-microscope"></i></div>
            <div class="orb"><i class="fas fa-atom"></i></div>
        </div>

        <div class="brand">
            <div class="brand-title">مدرسة الحوراء</div>
            <div class="brand-sub">نظام حجوزات المختبر المدرسي</div>
        </div>

        <div class="hdr-date">
            <div class="dt-lbl"><i class="fas fa-calendar-alt"></i> التاريخ</div>
            <div class="dt-val" id="dateVal">—</div>
            <div class="live"><span class="dot"></span>تحديث كل 5 دقائق</div>
        </div>
    </header>

    <!-- STATS -->
    <div class="stats">
        <div class="sc">
            <div class="si"><i class="fas fa-calendar-check"></i></div>
            <div class="st"><h3>إجمالي الحصص</h3><div class="sn" id="tot">8</div></div>
        </div>
        <div class="sc">
            <div class="si"><i class="fas fa-check-circle"></i></div>
            <div class="st"><h3>المحجوزة</h3><div class="sn" id="bkd">—</div></div>
        </div>
        <div class="sc">
            <div class="si"><i class="fas fa-hourglass-half"></i></div>
            <div class="st"><h3>الشاغرة</h3><div class="sn" id="emp">—</div></div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="tbox">
        <div class="tscroll" id="tscroll">
            <div class="loading"><div class="spin"></div><p>جاري تحميل جدول الحصص…</p></div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="ftr">
        <div class="fl">
            <i class="fas fa-tv"></i>
            <span>شاشة العرض الرئيسية — مدرسة الحوراء &copy; 2025</span>
        </div>
        <div class="fr">
            <div class="rw">
                <svg viewBox="0 0 36 36">
                    <circle class="rbg" cx="18" cy="18" r="15"/>
                    <circle class="rfill" id="ring" cx="18" cy="18" r="15"
                        stroke-dasharray="94.25" stroke-dashoffset="0"/>
                </svg>
            </div>
            <span id="cdown">التالي: 5:00</span>
        </div>
    </footer>

</div>

<script>
const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRASDUlO20FT6MI1NVQKSAKF4EBY1cVP0usamiNw37msjkFklLvqyUHtomJMOQu9_YfOERTok-X9ti/pub?output=csv';
const PERIODS = ["الأولى","الثانية","الثالثة","الرابعة","الخامسة","السادسة","السابعة","الثامنة"];
const REFRESH  = 300000;
let   nextRef  = Date.now() + REFRESH;
let   scrollDir = 1, scrollPos = 0, scrollTimer = null;

// ── countdown ──────────────────────────────────
function tick() {
    const rem  = Math.max(0, nextRef - Date.now());
    const sec  = Math.ceil(rem / 1000);
    const frac = rem / REFRESH;
    const circ = 94.25;
    document.getElementById('ring').style.strokeDashoffset = circ * (1 - frac);
    document.getElementById('cdown').textContent =
        `التالي: ${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`;
}
setInterval(tick, 1000);

// ── auto-scroll ────────────────────────────────
function startScroll() {
    const el = document.getElementById('tscroll');
    if (!el) return;
    if (scrollTimer) clearInterval(scrollTimer);
    scrollPos = 0; scrollDir = 1;
    scrollTimer = setInterval(() => {
        const max = el.scrollHeight - el.clientHeight;
        if (max <= 0) return;
        scrollPos += scrollDir * 0.7;
        el.scrollTop = scrollPos;
        if (scrollPos >= max)       { scrollDir = 0; setTimeout(() => scrollDir = -1, 2800); }
        else if (scrollPos <= 0)    { scrollDir = 0; setTimeout(() => scrollDir =  1, 2800); }
    }, 28);
}

// ── fetch ──────────────────────────────────────
async function load() {
    nextRef = Date.now() + REFRESH;
    const now   = new Date();
    const today = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
    document.getElementById('dateVal').textContent =
        now.toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

    const el = document.getElementById('tscroll');
    try {
        const res  = await fetch(CSV + '&t=' + Date.now());
        const txt  = await res.text();
        const rows = txt.split('\n').map(r => r.split(',').map(c => c.trim()));

        let booked = 0;
        let html = `<table><thead><tr>
            <th>#</th><th>الحصة</th><th>الصف</th><th>المادة</th><th>المعلمة</th><th>عنوان الدرس / التجربة</th>
        </tr></thead><tbody>`;

        PERIODS.forEach((p, i) => {
            let b = null;
            for (let r = 1; r < rows.length; r++) {
                const row = rows[r];
                if (row.length < 5) continue;
                // support both column layouts (old: row[2]=date,row[3]=period | new: row[2]=date,row[4]=period)
                const dateMatch   = row[2] === today;
                const periodMatch = row[3] === p || row[4] === p;
                if (dateMatch && periodMatch) {
                    // detect which layout
                    const isNewLayout = row[4] === p;
                    b = isNewLayout
                        ? { teacher: row[3]||'—', grade: row[5]||'—', subject: row[6]||'—', lesson: row[7]||'—' }
                        : { teacher: row[4]||'—', grade: row[6]||'—', subject: row[5]||'—', lesson: row[7]||'—' };
                    booked++; break;
                }
            }
            if (b) {
                html += `<tr class="booked">
                    <td><span class="pb">${i+1}</span></td>
                    <td><span class="pname">${p}</span></td>
                    <td><i class="fas fa-users" style="color:rgba(0,230,118,.6);margin-left:5px"></i>${b.grade}</td>
                    <td><i class="fas fa-book-open" style="color:rgba(0,230,118,.6);margin-left:5px"></i>${b.subject}</td>
                    <td><i class="fas fa-chalkboard-teacher" style="color:rgba(0,230,118,.6);margin-left:5px"></i>${b.teacher}</td>
                    <td><span class="chip"><i class="fas fa-flask"></i>${b.lesson}</span></td>
                </tr>`;
            } else {
                html += `<tr>
                    <td><span class="pb">${i+1}</span></td>
                    <td><span class="pname" style="color:#304d66">${p}</span></td>
                    <td colspan="4"><span class="empty-chip"><i class="fas fa-circle" style="font-size:.45em;opacity:.4"></i>شاغر — متاح للحجز</span></td>
                </tr>`;
            }
        });

        html += '</tbody></table>';
        el.innerHTML = html;
        document.getElementById('bkd').textContent = booked;
        document.getElementById('emp').textContent = PERIODS.length - booked;
        document.getElementById('tot').textContent = PERIODS.length;
        setTimeout(startScroll, 1800);

    } catch(e) {
        el.innerHTML = `<div class="errstate">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>تعذّر الاتصال</h3>
            <p>يرجى التحقق من اتصال الإنترنت</p>
            <button class="rbtn" onclick="load()"><i class="fas fa-sync-alt"></i> إعادة المحاولة</button>
        </div>`;
    }
}

load();
setInterval(load, REFRESH);
</script>
</body>
</html>
