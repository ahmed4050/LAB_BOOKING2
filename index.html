<!--
التغييرات المقترحة (ضعها داخل نفس الملف):
1) احذف: <meta http-equiv="refresh" content="300">
2) أضف داخل .info-bar عنصر لآخر تحديث + اختيار التوقيت
3) استبدل JS الحالي تقريباً بالنسخة أدناه (أو ادمجها)
-->

<!-- داخل info-bar (اقتراح إضافة عناصر) -->
<!--
<div class="update-info" id="lastUpdateInfo"><i class="fas fa-clock"></i> آخر تحديث: ...</div>

<div class="update-info">
  <i class="fas fa-route"></i>
  <select id="timingMode" style="padding:6px 10px;border-radius:10px;border:none;">
    <option value="first">التوقيت الأول</option>
    <option value="second">التوقيت الثاني</option>
  </select>
</div>
-->

<script>
  const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRASDUlO20FT6MI1NVQKSAKF4EBY1cVP0usamiNw37msjkFklLvqyUHtomJMOQu9_YfOERTok-X9ti/pub?output=csv';

  const schoolPeriods = ["الأولى", "الثانية", "الثالثة", "الرابعة", "الخامسة", "السادسة", "السابعة", "الثامنة"];

  // أوقات الحصص (حوّلناها إلى دقائق منذ منتصف الليل)
  // ملاحظة: “الطابور” و “الفسحة” ليست ضمن جدول الحجوزات الحالي (الذي يعرض 1..8)
  const scheduleTimes = {
    first: {
      "الطابور": ["07:00", "07:10"],
      "الأولى":  ["07:10", "07:50"],
      "الثانية": ["07:55", "08:35"],
      "الثالثة": ["08:40", "09:20"],
      "الرابعة": ["09:25", "10:05"],
      "الفسحة":  ["10:05", "10:25"],
      "الخامسة": ["10:25", "11:05"],
      "السادسة": ["11:10", "11:50"],
      "السابعة": ["11:55", "12:35"],
      "الثامنة": ["12:40", "13:20"],
    },
    second: {
      "الطابور": ["07:10", "07:20"],
      "الأولى":  ["07:20", "08:00"],
      "الثانية": ["08:05", "08:45"],
      "الثالثة": ["08:50", "09:30"],
      "الرابعة": ["09:35", "10:15"],
      "الفسحة":  ["10:15", "10:35"],
      "الخامسة": ["10:35", "11:15"],
      "السادسة": ["11:20", "12:00"],
      "السابعة": ["12:05", "12:45"],
      "الثامنة": ["12:50", "13:30"],
    }
  };

  let scrollInterval;
  let lastGoodRows = null;

  function isMobile() {
    return window.matchMedia("(max-width: 768px)").matches;
  }

  function startAutoScroll() {
    // لا تشغل auto-scroll على الجوال
    if (isMobile()) return;

    const wrapper = document.getElementById('tableWrapper');
    if (!wrapper) return;

    if (scrollInterval) clearInterval(scrollInterval);

    // ابدأ من الأعلى بعد كل تحديث
    wrapper.scrollTop = 0;
    let direction = 1;

    scrollInterval = setInterval(() => {
      const maxScroll = wrapper.scrollHeight - wrapper.clientHeight;
      if (maxScroll <= 0) return;

      const next = wrapper.scrollTop + direction * 0.8;
      wrapper.scrollTop = next;

      if (wrapper.scrollTop >= maxScroll) {
        direction = 0;
        setTimeout(() => { direction = -1; }, 3000);
      } else if (wrapper.scrollTop <= 0) {
        direction = 0;
        setTimeout(() => { direction = 1; }, 3000);
      }
    }, 30);
  }

  function toMinutes(hhmm) {
    const [h, m] = hhmm.split(':').map(Number);
    return h * 60 + m;
  }

  function nowMinutes() {
    const d = new Date();
    return d.getHours() * 60 + d.getMinutes();
  }

  function getCurrentAndNextPeriod(mode) {
    const times = scheduleTimes[mode];
    const current = nowMinutes();

    // ترتيب الفترات حسب الوقت
    const ordered = Object.entries(times)
      .map(([name, [from, to]]) => ({ name, fromM: toMinutes(from), toM: toMinutes(to), from, to }))
      .sort((a,b) => a.fromM - b.fromM);

    let currentSlot = null;
    let nextSlot = null;

    for (let i = 0; i < ordered.length; i++) {
      const slot = ordered[i];
      if (current >= slot.fromM && current < slot.toM) {
        currentSlot = slot;
        nextSlot = ordered[i + 1] || null;
        break;
      }
      if (current < slot.fromM) {
        nextSlot = slot;
        break;
      }
    }
    return { currentSlot, nextSlot };
  }

  // CSV parser يدعم الاقتباسات
  function parseCSV(text) {
    const rows = [];
    let row = [];
    let cur = '';
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      const next = text[i + 1];

      if (ch === '"' && inQuotes && next === '"') { // escaped quote
        cur += '"';
        i++;
        continue;
      }
      if (ch === '"') {
        inQuotes = !inQuotes;
        continue;
      }
      if (ch === ',' && !inQuotes) {
        row.push(cur.trim());
        cur = '';
        continue;
      }
      if ((ch === '\n' || ch === '\r') && !inQuotes) {
        if (ch === '\r' && next === '\n') i++;
        // commit line
        if (cur.length > 0 || row.length > 0) {
          row.push(cur.trim());
          rows.push(row);
        }
        row = [];
        cur = '';
        continue;
      }
      cur += ch;
    }

    if (cur.length > 0 || row.length > 0) {
      row.push(cur.trim());
      rows.push(row);
    }

    return rows;
  }

  function formatTodayYYYYMMDDslashes() {
    const now = new Date();
    return `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}`;
  }

  function setHeaderDate() {
    const now = new Date();
    const el = document.getElementById('currentDate');
    if (!el) return;
    el.innerHTML = `<i class="fas fa-calendar-day"></i> ${now.toLocaleDateString('ar-SA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}`;
  }

  function setLastUpdate(ok, extraText = '') {
    const el = document.getElementById('lastUpdateInfo');
    if (!el) return;
    const now = new Date();
    if (ok) {
      el.innerHTML = `<i class="fas fa-clock"></i> آخر تحديث: ${now.toLocaleTimeString('ar-SA')} ${extraText ? ' - ' + extraText : ''}`;
    } else {
      el.innerHTML = `<i class="fas fa-triangle-exclamation"></i> تعذر التحديث: ${now.toLocaleTimeString('ar-SA')} ${extraText ? ' - ' + extraText : ''}`;
    }
  }

  function buildBookingMap(rows) {
    // حسب عينتك:
    // عمود التاريخ = 2
    // عمود الحصة = 3
    // المعلمة=4 المادة=5 الصف=6 عنوان الدرس=7
    // (قد تختلف إذا تغيّر الشيت، لكن هذا مطابق للبيانات التي أرسلتها)
    const map = new Map();
    for (let i = 1; i < rows.length; i++) {
      const r = rows[i];
      const date = (r[2] || '').trim();
      const period = (r[3] || '').trim();
      if (!date || !period) continue;

      const key = `${date}__${period}`;
      if (!map.has(key)) {
        map.set(key, {
          teacher: (r[4] || '').trim(),
          subject: (r[5] || '').trim(),
          grade: (r[6] || '').trim(),
          lesson: (r[7] || '').trim()
        });
      }
    }
    return map;
  }

  function renderTable(bookingMap, today, mode) {
    let bookedCount = 0;

    const { currentSlot, nextSlot } = getCurrentAndNextPeriod(mode);

    // شريط معلومات إضافي بسيط (اختياري)
    // يمكنك وضعه داخل tableContent أعلى الجدول أو في header
    let html = '';

    // جدول
    html += '<table class="schedule-table"><thead><tr><th>#</th><th>الحصة</th><th>الصف</th><th>المادة</th><th>المعلمة</th><th>عنوان الدرس</th></tr></thead><tbody>';

    schoolPeriods.forEach((period, index) => {
      const key = `${today}__${period}`;
      const booking = bookingMap.get(key) || null;

      const isCurrent = currentSlot && currentSlot.name === period;
      const isNext = nextSlot && nextSlot.name === period;

      let rowClass = '';
      if (booking) rowClass += ' booked';
      if (isCurrent) rowClass += ' current-period';
      else if (isNext) rowClass += ' next-period';

      if (booking) {
        bookedCount++;
        html += `<tr class="${rowClass.trim()}">
          <td>${index + 1}</td>
          <td>${period}</td>
          <td>${booking.grade || '-'}</td>
          <td>${booking.subject || '-'}</td>
          <td>${booking.teacher || '-'}</td>
          <td><span class="experiment-badge">${booking.lesson || '-'}</span></td>
        </tr>`;
      } else {
        html += `<tr class="${rowClass.trim()}">
          <td>${index + 1}</td>
          <td>${period}</td>
          <td colspan="4" class="empty-cell"><i class="fas fa-check-circle"></i> متاح للحجز</td>
        </tr>`;
      }
    });

    html += '</tbody></table>';

    document.getElementById('tableContent').innerHTML = html;
    document.getElementById('bookedCount').textContent = bookedCount;
    document.getElementById('emptyCount').textContent = schoolPeriods.length - bookedCount;
  }

  async function fetchSchedule() {
    setHeaderDate();

    const modeEl = document.getElementById('timingMode');
    const mode = modeEl ? modeEl.value : 'first';

    const today = formatTodayYYYYMMDDslashes();

    try {
      const response = await fetch(csvUrl, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const text = await response.text();
      const rows = parseCSV(text);
      lastGoodRows = rows;

      const bookingMap = buildBookingMap(rows);
      renderTable(bookingMap, today, mode);

      setLastUpdate(true);
      setTimeout(startAutoScroll, 700);
    } catch (e) {
      // fallback: اعرض آخر بيانات ناجحة إن وجدت
      if (lastGoodRows) {
        const modeEl = document.getElementById('timingMode');
        const mode = modeEl ? modeEl.value : 'first';

        const today = formatTodayYYYYMMDDslashes();
        const bookingMap = buildBookingMap(lastGoodRows);
        renderTable(bookingMap, today, mode);
        setLastUpdate(false, 'تم عرض آخر بيانات محفوظة');
      } else {
        document.getElementById('tableContent').innerHTML =
          '<p style="text-align:center; padding:20px;">خطأ في تحميل البيانات... تأكد من الاتصال بالإنترنت</p>';
        setLastUpdate(false, String(e?.message || e));
      }
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    fetchSchedule();
    setInterval(fetchSchedule, 300000);

    const modeEl = document.getElementById('timingMode');
    if (modeEl) modeEl.addEventListener('change', fetchSchedule);
  });
</script>

<!-- CSS إضافي لتوضيح الحصة الحالية والقادمة -->
<style>
  /* تظليل الحصة الحالية والقادمة */
  .current-period td {
    outline: 3px solid #f39c12;
    position: relative;
  }
  .next-period td {
    outline: 3px dashed rgba(52,152,219,0.7);
    position: relative;
  }

  /* تحسين على الجوال: خلي الجدول أصغر ومسافات أقل */
  @media (max-width: 768px) {
    .schedule-table td, .schedule-table th {
      padding: 10px 6px;
      font-size: 0.95rem;
    }
  }
</style>
</script>
